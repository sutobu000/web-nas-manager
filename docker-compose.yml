services:
  nas-filemanager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web-nas-filemanager
    ports:
      - "3000:3000"
    volumes:
      # Mount each storage location to /data/<id>.
      # <id> must match an "id" in drives.json. Add or remove lines to match it.
      # Windows hosts use drive paths, e.g. - E:\photos:/data/photos
      - /path/to/photos:/data/photos
      - /path/to/backup:/data/backup
      # Drive list shown in the UI (id / display name / icon). See drives.example.json.
      - ./drives.json:/config/drives.json:ro
      # Thumbnail cache (named volume)
      - thumbnail-cache:/cache/thumbnails
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - JWT_SECRET=${JWT_SECRET}
      - AUTH_USERNAME=${AUTH_USERNAME}
      - AUTH_PASSWORD_HASH=${AUTH_PASSWORD_HASH}

volumes:
  thumbnail-cache:
